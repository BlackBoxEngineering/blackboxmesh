[platformio]
default_envs = heltec_wifi_lora_32_v3

[env]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
    jgromes/RadioLib@^7.2.0
    bblanchon/ArduinoJson@^7.3.0
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1

[env:heltec_wifi_lora_32_v3]
platform = espressif32
board = heltec_wifi_lora_32_V3
; Firmware does no networking — the USB host (services/serial-bridge.ts)
; handles GPS ingestion and MQTT/IoT Core forwarding via line protocol on
; the existing 115200 baud USB CDC link. No secrets needed in build.
build_flags = 
    -D WIFI_LORA_32_V3
    -D HELTEC_BOARD=30
    -D LoRaWAN_DEBUG_LEVEL=0
    -D SLOW_CLK_TPYE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D REGION_EU868
